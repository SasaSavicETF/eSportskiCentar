<p-toast></p-toast>
<div class="sadrzaj">
    <div class="parent">
        <div>
            <h1>Sport</h1>
        </div>
        <!-- Modal za dodavanje -->
        <div class="addDiv">
            <p-button label="Dodaj" icon="pi pi-plus" severity="help" (click)="showAddDialog()"></p-button>
            <p-dialog header="Dodavanje sporta" [(visible)]="addVisible" [modal]="true" [style]="{ width: '500px'}" [draggable]="false" [resizable]="false">
                <div class="container">
                   <form #addForm="ngForm" (ngSubmit)="onAddSport(addForm)">
                        <label for="naziv_sporta">Naziv Sporta</label>
                        <input type="text" pInputText class="textInput" id="naziv_sporta" ngModel name="nazivSporta" required/>
                        <div class="form-group">
                            <label for="duzina">Dužina</label>
                            <input type="text" pInputText class="textInput1" pattern="[0-9]+([.,][0-9]+)?" id="duzina" ngModel name="duzina" required/>
                            <label for="sirina">Širina</label>
                            <input type="text" pInputText class="textInput1" pattern="[0-9]+([.,][0-9]+)?" id="sirina" ngModel name="sirina" required/>
                        </div>
                        <div class="addBtn">
                            <p-button type="submit" [disabled]="addForm.invalid || false" label="Sačuvaj" [raised]="true" severity="help"></p-button>
                        </div>
                    </form>
                </div>
            </p-dialog>
        </div>
    </div>
    <div class="search card flex flex-wrap justify-content-center gap-3">
        <span>

        </span>
        <span class="p-input-icon-left">
            <i class="pi pi-search"></i>
            <input type="search" pInputText (ngModelChange)="searchSports(key.value)" #key="ngModel" ngModel/>
        </span>
    </div>
    <p-table
        [value]="sports"
        [paginator]="true"
        [rows]="5"
        [showCurrentPageReport]="true"
        [tableStyle]="{ 'min-width': '50rem' }"
        currentPageReportTemplate="Prikazano od {first}. do {last}. od ukupno {totalRecords} zapisa"
        [rowsPerPageOptions]="[5, 10, 25, 50]"
        paginatorLocale="en-US"
    >
    <ng-template pTemplate="header">
        <tr>
            <th style="width: 25%;">Naziv sporta</th>
            <th style="width: 25%">Dužina</th>
            <th style="width: 25%">Širina</th>
            <th style="width: 25%">Opcije</th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body" let-sport>
        <tr>
            <td>{{ sport.nazivSporta }}</td>
            <td>{{ sport.duzina }} m</td>
            <td>{{ sport.sirina }} m</td>
            <td>
                <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" styleClass="p-button-text" (click)="showEditDialog(sport)"></p-button>
                <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger " (click)="showDeleteDialog(sport)"></p-button>
            </td>
        </tr>
    </ng-template>
    
    </p-table>
</div>

<!--Modal za izmjenu(edit)-->
<p-dialog header="Izmjena sporta" [(visible)]="editVisible" [modal]="true" [style]="{ width: '500px'}" [draggable]="false" [resizable]="false">
    <div class="container">
        <form #editForm="ngForm">
            <input type="hidden" id="id_sport" ngModel="{{editSport?.idSport}}" name="idSport"/>
            <label for="naziv_sporta">Naziv sporta</label>
            <input type="text" pInputText class="textInput" id="naziv_sporta" ngModel="{{editSport?.nazivSporta}}" name="nazivSporta" required/>
            <div class="form-group">
                <label for="duzina">Duzina</label>
                <input type="text" pInputText class="textInput1" pattern="[0-9]+([.,][0-9]+)?" id="duzina" ngModel="{{editSport?.duzina}}" name="duzina" required/>
                <label for="sirina">Sirina</label>
                <input type="text" pInputText class="textInput1" pattern="[0-9]+([.,][0-9]+)?" id="sirina" ngModel="{{editSport?.sirina}}" name="sirina" required/>
            </div>
            <div class="addBtn">
                <p-button (onClick)="onUpdateSport(editForm.value)" [disabled]="editForm.invalid || false" type="submit" label="Sačuvaj" [raised]="true" severity="help"></p-button>
            </div>
        </form>
    </div>
</p-dialog>

<!--Modal za brisanje-->
<p-dialog header="Upozorenje" [(visible)]="deleteVisible" [modal]="true" [style]="{ width: '500px'}" [draggable]="true" [resizable]="false">
    <div class="container">
        <p>Da li zaista želite da obrišete zapis {{delSport?.nazivSporta}}?</p>
        <br>
        <div class="addBtn">
            <p-button (onClick)="closeDeleteDialog()" class="scndBtn" label="Odustani" severity="secondary"></p-button>
            <p-button (onClick)="onDeleteSport(delIdSport)" label="Obriši" severity="danger"></p-button>
        </div>
    </div>
</p-dialog>
