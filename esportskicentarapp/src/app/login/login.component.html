<div class="background-image">

    <form method="post" (ngSubmit)="login()" ngNativeValidate>
        <div class="row">
            <img class="rounded-image" src="/assets/img/logo.png">
        </div>
        
        <h1>Prijava</h1>
        <p>Unesite Vaše podatke kako biste se prijavili u odgovarajuću aplikaciju</p>
    
        <label>Korisničko ime: </label>
        <input type="text" [(ngModel)]="username" name="username" required autofocus>
    
        <label>Lozinka: </label>
        <input type="password" [(ngModel)]="password" name="password" required>
        
        <input type="submit" value="Prijava">  
        <input type="button" value="Registracija" (click)="register()">
    </form>

</div>
