<p-toast></p-toast>
<div class="sadrzaj">
    <div class="parent">

        <div class="info">
            <div class="status-card">
                <div class="status-card-icon">
                    <i class="pi pi-user" style="font-size: 2.5rem"></i>
                </div>
                <div class="status-card-info">
                    <h3>{{numberOfKlijents}}</h3>
                    <span>Broj korisnika</span>
                </div>
            </div>

            <div class="status-card">
                <div class="status-card-icon">
                    <i class="pi pi-home" style="font-size: 2.5rem"></i>
                </div>
                <div class="status-card-info">
                    <h3>{{numberOfDvoranas}}</h3>
                    <span>Broj dvorana</span>
                </div>
            </div>

            <div class="status-card">
                <div class="status-card-icon">
                    <i class="pi pi-calendar-times" style="font-size: 2.5rem"></i>
                </div>
                <div class="status-card-info">
                    <h3> {{numberOfDogadjajs}} </h3>
                    <span>Broj dogadjaja</span>
                </div>
            </div>

            <div class="status-card">
                <div class="status-card-icon">
                    <i class="pi pi-tag" style="font-size: 2.5rem"></i>
                </div>
                <div class="status-card-info">
                    <h3>{{numberOfRezervacija}}</h3>
                    <span>Broj rezervacija</span>
                </div>
            </div>
        </div>

        <div class="event-card">
            <div class="event-info">
            <h3 class="chart-name">Dogadjaji</h3>
            <div class="drop card flex justify-content-center">
                <p-dropdown class="custom-dd" [options]="dateOptions" name="eventDate" [(ngModel)]="selectedDate" (onChange)="updateEventStats()" [showClear]="false"></p-dropdown>
            </div>
            </div>
            <p-chart class="event" type="line" [data]="eventData"></p-chart>
        </div>

        <div class="card-container">
            <div class="card-body">
                <h3 class="chart-name">Sportovi</h3>
                <p-chart type="pie" [data]="data"  [options]="options"  width="350" height="200"></p-chart>
            </div>

            <div class="card-body">
                <h3 class="chart-name">Rezervacije vs bez rezervacija</h3>
                <p-chart type="doughnut" [data]="userdata" [options]="options" width="350" height="200"></p-chart>
            </div>
        </div>

    </div>
</div>
