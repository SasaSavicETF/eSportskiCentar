<p-toast></p-toast>
<div class="sadrzaj">
    <div class="parent">
        <div class="p-col-12">
            <h1>Pregled događaja</h1>
        </div>
        <div class="cards-container">
            <div *ngFor="let dogadjaj of paginatedDogadjajs" class="card-container">
                <p-card>
                    <ng-template pTemplate="title">
                        {{fixDate(dogadjaj.dnevniRaspored.datum)}}<br />
                        {{dogadjaj.vrijemeOd}} - {{dogadjaj.vrijemeDo}}<br />
                    </ng-template>
                    <h3>Teren: {{dogadjaj.teren.nazivTerena}}</h3>
                    <h3>Cijena: {{dogadjaj.cijena}} KM</h3>
                    <ng-template pTemplate="footer">
                        <div class="footer">
                            <p-button (onClick)="showDeleteDialog(dogadjaj)" class="main-btn" label="Otkaži"
                                severity="danger" class="w-full" styleClass="w-full" />
                        </div>
                    </ng-template>
                </p-card>
            </div>

            <p-paginator
             [rows]="6" 
             [totalRecords]="dogadjajs.length" 
             [first]="currentPage"
             [showCurrentPageReport]="true"
             paginatorLocale="en-US"
             currentPageReportTemplate="Prikazano od {first}. do {last}. od ukupno {totalRecords} zapisa"
             (onPageChange)="paginate($event)"></p-paginator>

        </div>
    </div>
</div>

<p-dialog header="Upozorenje" [(visible)]="deleteVisible" [modal]="true" [style]="{ width: '500px'}" [draggable]="true" [resizable]="false">
    <div class="container">
        <p>Da li zaista želite da obrišete zapis?</p>
        <br>
        <div class="addBtn">
            <p-button (onClick)="closeDeleteDialog()" class="scndBtn" label="Odustani" severity="secondary"></p-button>
            <p-button (onClick)="onDeleteDogadjaj(delIdDogadjaj)" label="Obriši" severity="danger"></p-button>
        </div>
    </div>
</p-dialog>
