<p-toast></p-toast>
<div class="sadrzaj">
    <div class="parent">
        <div>
            <h1>Ulaz</h1>
        </div>
        <!-- Modal za dodavanje -->
        <div class="addDiv">
            <p-button class="main-btn" label="Dodaj" icon="pi pi-plus" severity="help" (click)="showAddDialog()"></p-button>
            <p-dialog header="Dodavanje ulaza" [(visible)]="addVisible" [modal]="true" [style]="{ width: '500px'}" [draggable]="false" [resizable]="false">
                <div class="container">
                   <form #addForm="ngForm" (ngSubmit)="onAddUlaz(addForm)">
                        <label for="naziv_ulaza">Naziv Ulaza</label>
                        <input type="text" pInputText class="textInput" id="naziv_ulaza" ngModel name="nazivUlaza" required/>
                        <label for="broj_ulaza">Broj ulaza</label>
                        <input type="number" pInputText class="textInput" id="broj_ulaza" ngModel name="brojUlaza"/>
                    
                        
                        <div class="card flex justify-content-center check">
                            <p-checkbox 
                                [(ngModel)]="checkedAdd"
                                [binary]="true"
                                name="dostupan" 
                                inputId="dostupan" />
                            <label class="forCheck" for="dostupan">Dostupan</label>
                        </div>
                        <div class="drop card flex justify-content-center">
                            <p-dropdown class="custom-dd" [options]="dvoranas" [(ngModel)]="selectedDvorana" name="dvorana" optionLabel="nazivDvorane" [showClear]="true" placeholder="Izaberi dvoranu"></p-dropdown>
                        </div>
                        <div class="addBtn">
                            <p-button class="main-btn" type="submit" [disabled]="addForm.invalid || false" label="Sačuvaj" [raised]="true" severity="help"></p-button>
                        </div>
                    </form>
                </div>
            </p-dialog>
        </div>
    </div>
    <div class="search card flex flex-wrap justify-content-center gap-3">
        <span>

        </span>
        <span class="p-input-icon-left">
            <i class="pi pi-search"></i>
            <input type="search" pInputText (ngModelChange)="searchUlazs(key.value)" #key="ngModel" ngModel/>
        </span>
    </div>
    <p-table
        [value]="ulazs"
        [paginator]="true"
        [rows]="5"
        [showCurrentPageReport]="true"
        [tableStyle]="{ 'min-width': '50rem' }"
        currentPageReportTemplate="Prikazano od {first}. do {last}. od ukupno {totalRecords} zapisa"
        [rowsPerPageOptions]="[5, 10, 25, 50]"
        paginatorLocale="en-US"
    >
    <ng-template pTemplate="header">
        <tr>
            <th style="width: 20%">Naziv ulaza</th>
            <th style="width: 20%">Broj ulaza</th>
            <th style="width: 20%">Dvorana</th>  
            <th style="width: 20%">Dostupan</th>
            <th style="width: 20%">Opcije</th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body" let-ulaz>
        <tr>
            <td>{{ ulaz.nazivUlaza }}</td>
            <td>{{ ulaz.brojUlaza }}</td>
            <td>{{ ulaz.dvorana.nazivDvorane }}</td>
            <td [ngClass]="ulaz.dostupan ? 'available' : 'not-available'">
                {{ ulaz.dostupan ? 'Dostupan' : 'Nije dostupan' }}
              </td>
            
            <td>
                <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" styleClass="p-button-text" (click)="showEditDialog(ulaz)"></p-button>
                <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger " (click)="showDeleteDialog(ulaz)"></p-button>
            </td>
        </tr>
    </ng-template>
    
    </p-table>
</div>

<!--Modal za izmjenu(edit)-->
<p-dialog header="Izmjena ulaza" [(visible)]="editVisible" [modal]="true" [style]="{ width: '500px'}" [draggable]="false" [resizable]="false">
    <div class="container">
        <form #editForm="ngForm">
            <input type="hidden" id="id_ulaz" ngModel="{{editUlaz?.idUlaz}}" name="idUlaz"/>
            <label for="naziv_ulaza">Naziv ulaza</label>
            <input type="text" pInputText class="textInput" id="naziv_ulaza" ngModel="{{editUlaz?.nazivUlaza}}" name="nazivUlaza" required/>
            <label for="broj_ulaza">Broj ulaza</label>
            <input type="number" pInputText class="textInput" id="broj_ulaza" ngModel="{{editUlaz?.brojUlaza}}" name="brojUlaza"/>
            <div class="card flex justify-content-center check">
                <p-checkbox 
                    [(ngModel)]="checkedEdit"
                    [binary]="true"
                    name="dostupan" 
                    inputId="dostupan" />
                <label class="forCheck" for="dostupan">Dostupan</label>
            </div>
            <div class="drop card flex justify-content-center">
                <p-dropdown class="custom-dd" [options]="dvoranas" [(ngModel)]="selectedDvorana" name="dvorana" optionLabel="nazivDvorane" [showClear]="true" placeholder="Izaberi dvoranu"></p-dropdown>
            </div>
            <div class="addBtn">
                <p-button class="main-btn" (onClick)="onUpdateUlaz(editForm.value)" [disabled]="editForm.invalid || false" type="submit" label="Sačuvaj" [raised]="true" severity="help"></p-button>
            </div>
        </form>
    </div>
</p-dialog>

<!--Modal za brisanje-->
<p-dialog header="Upozorenje" [(visible)]="deleteVisible" [modal]="true" [style]="{ width: '500px'}" [draggable]="true" [resizable]="false">
    <div class="container">
        <p>Da li zaista želite da obrišete zapis {{delUlaz?.nazivUlaza}}?</p>
        <br>
        <div class="addBtn">
            <p-button (onClick)="closeDeleteDialog()" class="scndBtn" label="Odustani" severity="secondary"></p-button>
            <p-button (onClick)="onDeleteUlaz(delIdUlaz)" label="Obriši" severity="danger"></p-button>
        </div>
    </div>
</p-dialog>
