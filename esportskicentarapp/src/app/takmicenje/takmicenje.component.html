<p-toast></p-toast>
<div class="sadrzaj">
    <div class="parent">
        <div>
            <h1>Takmičenje</h1>
        </div>
        <!-- Modal za dodavanje -->
        <div class="addDiv">
            <p-button label="Dodaj" icon="pi pi-plus" severity="help" (click)="showAddDialog()"></p-button>
            <p-dialog header="Dodavanje takmičenja" [(visible)]="addVisible" [modal]="true" [style]="{ width: '500px'}" [draggable]="false" [resizable]="false">
                <div class="container">
                    <form #addForm="ngForm" (ngSubmit)="onAddTakmicenje(addForm)">
                        <label for="vrsta_takmicenja">Vrsta takmičenja</label>
                        <input type="text" pInputText class="textInput" id="vrsta_takmicenja" ngModel name="vrstaTakmicenja" required/>
                        <div class="addBtn">
                            <!--<p-button label="Secondary" severity="secondary"></p-button>-->
                            <p-button type="submit" [disabled]="addForm.invalid || false" label="Sačuvaj" [raised]="true" severity="help"></p-button>
                        </div>
                    </form>
                </div>
            </p-dialog>
        </div>
    </div>
    <div class="search card flex flex-wrap justify-content-center gap-3">
        <span>

        </span>
        <span class="p-input-icon-left">
            <i class="pi pi-search"></i>
            <input type="search" pInputText (ngModelChange)="searchTakmicenjes(key.value)" #key="ngModel" ngModel/>
        </span>
    </div>
    <p-table
        [value]="takmicenjes"
        [paginator]="true"
        [rows]="5"
        [showCurrentPageReport]="true"
        [tableStyle]="{ 'min-width': '50rem' }"
        currentPageReportTemplate="Prikazano od {first}. do {last}. od ukupno {totalRecords} zapisa"
        [rowsPerPageOptions]="[5, 10, 25, 50]"
        paginatorLocale="en-US"
    >
    <ng-template pTemplate="header">
        <tr>
            <th style="width: 33%;">Id</th>
            <th style="width: 33%">Vrsta takmičenja</th>
            <th style="width: 33%">Opcije</th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body" let-takmicenje>
        <tr>
            <td>{{ takmicenje.idTakmicenje }}</td>
            <td>{{ takmicenje.vrstaTakmicenja }}</td>
            <td>
                <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" styleClass="p-button-text" (click)="showEditDialog(takmicenje)"></p-button>
                <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger " (click)="showDeleteDialog(takmicenje)"></p-button>
            </td>
        </tr>
    </ng-template>
    
    </p-table>
</div>

<!--Modal za izmjenu(edit)-->
<p-dialog header="Izmjena takmičenja" [(visible)]="editVisible" [modal]="true" [style]="{ width: '500px'}" [draggable]="false" [resizable]="false">
    <div class="container">
        <form #editForm="ngForm">
            <input type="hidden" id="id_takmicenje" ngModel="{{editTakmicenje?.idTakmicenje}}" name="idTakmicenje"/>
            <label for="vrsta_takmicenja">Vrsta takmičenja</label>
            <input type="text" pInputText class="textInput" id="vrsta_takmicenja" ngModel="{{editTakmicenje?.vrstaTakmicenja}}" name="vrstaTakmicenja" required/>
            <div class="addBtn">
                <!--<p-button label="Secondary" severity="secondary"></p-button>-->
                <p-button (onClick)="onUpdateTakmicenje(editForm.value)" [disabled]="editForm.invalid || false" type="submit" label="Sačuvaj" [raised]="true" severity="help"></p-button>
            </div>
        </form>
    </div>
</p-dialog>

<!--Modal za brisanje-->
<p-dialog header="Upozorenje" [(visible)]="deleteVisible" [modal]="true" [style]="{ width: '500px'}" [draggable]="true" [resizable]="false">
    <div class="container">
        <p>Da li zaista želite da obrišete zapis {{delTakmicenje?.vrstaTakmicenja}}?</p>
        <br>
        <div class="addBtn">
            <p-button (onClick)="closeDeleteDialog()" class="scndBtn" label="Odustani" severity="secondary"></p-button>
            <p-button (onClick)="onDeleteTakmicenje(delIdTakmicenje)" label="Obriši" severity="danger"></p-button>
        </div>
    </div>
</p-dialog>
